<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>April Fool 😂</title>
 <link rel="icon" type="image/x-icon" href="flag.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family: 'Ubuntu', sans-serif;
overflow:hidden;
text-align:center;
}

/* Center container */

.container{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
}

/* Image */

.container img{
max-width:300px;
width:80%;
height:auto;
animation:pop 1s ease;
}

/* Text */

.text{
font-size:5vw;
font-weight:bold;
margin-top:20px;
animation:bounce 1.2s infinite alternate;
}

/* Pop animation */

@keyframes pop{
0%{
transform:scale(0);
}
100%{
transform:scale(1);
}
}

/* Bounce text */

@keyframes bounce{
from{
transform:translateY(-10px);
}
to{
transform:translateY(10px);
}
}

/* Floating emojis */

.emoji{
position:absolute;
font-size:30px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(-20vh);
opacity:0;
}
}

/* Mobile adjustments */

@media (max-width:600px){

.text{
font-size:8vw;
}

.container img{
max-width:200px;
}

}

</style>
</head>

<body>

<div class="container">

<img src="https://i.ytimg.com/vi/tYKNDYC-sww/oardefault.jpg?sqp=-oaymwEYCJUDENAFSFqQAgHyq4qpAwcIARUAAIhC&rs=AOn4CLB75ZEfujmE4an38SOce25uhgJtLQ&usqp=CCk" alt="April Fool">

<div class="text">
APRIL FOOL 😂
</div>

</div>

<!-- SOUND -->

<audio id="prankSound">
  <source src="https://www.myinstants.com/media/sounds/faaah.mp3" type="audio/mpeg">
</audio>

<script>

document.body.addEventListener("click", function(){

let sound = document.getElementById("prankSound");

sound.currentTime = 0; 
sound.play();

});

</script>

<!-- EMOJIS -->

<div class="emoji" style="left:10%">😂</div>
<div class="emoji" style="left:30%; animation-delay:1s">🤣</div>
<div class="emoji" style="left:50%; animation-delay:2s">😜</div>
<div class="emoji" style="left:70%; animation-delay:3s">🤡</div>
<div class="emoji" style="left:90%; animation-delay:4s">😂</div>

</body>
</html>
